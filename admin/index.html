<!doctype html>
<html lang="bg">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Админ панел | Граматиково</title>
    <style>
      :root {
        color-scheme: light;
        --admin-bg: #f4f1ea;
        --admin-ink: #17201b;
        --admin-muted: #66736b;
        --admin-panel: #ffffff;
        --admin-panel-soft: #f8f7f2;
        --admin-header: #102018;
        --admin-border: rgba(23, 32, 27, 0.14);
        --admin-accent: #2f9f68;
        --admin-focus: rgba(47, 159, 104, 0.22);
      }

      html,
      body,
      #nc-root {
        min-height: 100%;
        background:
          linear-gradient(180deg, rgba(16, 32, 24, 0.08), transparent 220px),
          var(--admin-bg) !important;
      }

      body {
        margin: 0;
        color: var(--admin-ink) !important;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif !important;
      }

      [class*="Toolbar"],
      [class*="TopBar"],
      [class*="EditorToolbar"] {
        min-height: 58px !important;
        color: #fff !important;
        background: var(--admin-header) !important;
        border-color: rgba(255, 255, 255, 0.08) !important;
        box-shadow: 0 14px 34px rgba(16, 32, 24, 0.2) !important;
      }

      [class*="EditorControl"],
      [class*="ObjectControl"],
      [class*="NestedObject"],
      [class*="ListControl"] {
        color: var(--admin-ink) !important;
        background: var(--admin-panel) !important;
        border: 1px solid var(--admin-border) !important;
        border-radius: 8px !important;
        box-shadow: 0 12px 34px rgba(23, 32, 27, 0.08) !important;
      }

      [class*="ObjectControl"] > div,
      [class*="NestedObject"] > div {
        border-color: var(--admin-border) !important;
      }

      [class*="ObjectControl"] [class*="Control"] {
        margin-bottom: 18px !important;
      }

      [class*="ControlLabel"],
      label {
        color: var(--admin-muted) !important;
        font-size: 0.78rem !important;
        font-weight: 760 !important;
        letter-spacing: 0 !important;
        text-transform: uppercase;
      }

      input,
      textarea,
      select {
        min-height: 46px !important;
        color: var(--admin-ink) !important;
        background: #fff !important;
        border: 1px solid rgba(23, 32, 27, 0.18) !important;
        border-radius: 7px !important;
        box-shadow: inset 0 1px 0 rgba(23, 32, 27, 0.04) !important;
      }

      textarea {
        min-height: 118px !important;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--admin-accent) !important;
        outline: 3px solid var(--admin-focus) !important;
      }

      button,
      [role="button"] {
        border-radius: 7px !important;
        font-weight: 760 !important;
      }

      button[class*="primary"],
      [class*="Button"][class*="primary"],
      [class*="Published"],
      [class*="publish"] {
        color: #062016 !important;
        background: #4fd19b !important;
      }

      a {
        color: #1f7a4d !important;
      }

      @media (min-width: 980px) {
        [class*="ObjectControl"] > div:last-child,
        [class*="NestedObject"] > div:last-child {
          display: grid !important;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 18px 20px !important;
          align-items: start;
        }

        [class*="ObjectControl"] > div:last-child > *,
        [class*="NestedObject"] > div:last-child > * {
          min-width: 0;
          margin: 0 !important;
        }

        [class*="ObjectControl"] > div:last-child > *:has(textarea),
        [class*="ObjectControl"] > div:last-child > *:has([class*="ListControl"]),
        [class*="NestedObject"] > div:last-child > *:has(textarea),
        [class*="NestedObject"] > div:last-child > *:has([class*="ListControl"]) {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
